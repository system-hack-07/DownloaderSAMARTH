<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samarth Premium Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  background:#000;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

.bg{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#ff004c22,#000,#0066ff22);
  z-index:-2;
}

.blur1,.blur2{
  position:fixed;
  width:300px;height:300px;
  filter:blur(120px);
  border-radius:50%;
  z-index:-1;
}

.blur1{background:red;top:50px;left:50px;}
.blur2{background:blue;bottom:50px;right:50px;}

.container{
  max-width:800px;
  margin:auto;
  padding:40px 20px;
}

.title{
  text-align:center;
  font-size:60px;
  font-weight:800;
  background:linear-gradient(to right,#ff004c,#ff00aa,#0066ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card{
  margin-top:30px;
  padding:25px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:25px;
  backdrop-filter:blur(20px);
}

input,select{
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:15px;
  border:none;
  background:#111;
  color:#fff;
  outline:none;
}

button{
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:15px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(to right,#ff004c,#0066ff);
}

.result{
  display:none;
  margin-top:20px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.result img{width:100%;height:250px;object-fit:cover;}

.result-content{padding:20px;}

a.download{
  display:block;
  margin-top:15px;
  padding:15px;
  text-align:center;
  background:linear-gradient(to right,#00c853,#00e676);
  border-radius:15px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}

.error{
  display:none;
  margin-top:15px;
  color:#ff4d4d;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="blur1"></div>
<div class="blur2"></div>

<div class="container">

<h1 class="title">SAMARTH</h1>

<div class="card">

<input id="url" placeholder="Enter YouTube URL">

<select id="quality">
  <option value="144">144p</option>
  <option value="360">360p</option>
  <option value="720" selected>720p</option>
  <option value="1080">1080p</option>
</select>

<button onclick="downloadVideo()" id="btn">Download</button>

<div class="error" id="error"></div>

</div>

<div class="result" id="result">
  <img id="thumb">
  <div class="result-content">
    <h2 id="title"></h2>
    <p id="q"></p>
    <a id="link" class="download" target="_blank" rel="noopener noreferrer">
      Start Download
    </a>
  </div>
</div>

</div>

<!-- Sounds -->
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
<audio id="errorSound" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>

<script>
function play(id){
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

async function downloadVideo(){
  const url=document.getElementById("url").value;
  const quality=document.getElementById("quality").value;

  const error=document.getElementById("error");
  const result=document.getElementById("result");
  const btn=document.getElementById("btn");

  error.style.display="none";
  result.style.display="none";

  if(!url){
    error.innerText="Please enter URL";
    error.style.display="block";
    play("errorSound");
    return;
  }

  try{
    btn.innerText="Loading...";
    play("clickSound");

    const api=`/api/download?url=${encodeURIComponent(url)}&quality=${quality}`;

    const res=await fetch(api);
    const data=await res.json();

    if(!data || !data.download){
      throw new Error("No download link");
    }

    document.getElementById("thumb").src=data.thumbnail || "";
    document.getElementById("title").innerText=data.title || "Video";
    document.getElementById("q").innerText=quality+"p";

    document.getElementById("link").href=data.download || data.url;

    result.style.display="block";
    play("successSound");

  }catch(e){
    error.innerText="Failed to fetch video";
    error.style.display="block";
    play("errorSound");
  }

  btn.innerText="Download";
}
</script>

</body>
  </html>
